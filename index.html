<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Clandestina</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1>Testando JS - Luan</h1>

    <div class="bloco">
        <h2>Realizando alteração no HTML com JS</h2>
        <p id="mensagem">Abrir mensagem sigilosa sigilosamente</p>
        <button onclick="revelarMensagem()">Desvendar a mensagem secreta secretamente</button>
        <br><br>
    </div>

    <div class="bloco">
        <h2>Testando alteração usando variáveis</h2>
        <label for="nomeUsuario">Usuário Sinistro:</label>
        <input type="text" id="nomeUsuario">
        <br><br>
        <button onclick="mostrarNome()">Registrar Sinistramente</button>
        <br><br>

        <p id="resultadoNome">Seu usuário será revelado sigilosamente aqui.</p>
    </div>

    <script src="script.js"></script>

</body>
</html>
